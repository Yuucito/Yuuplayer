<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamForge — Generador de Reproductores</title>

  <!-- HLS.js para streams .m3u8 -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>

  <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════
       TOKENS & VARIABLES
    ═══════════════════════════════════════════════════ */
    :root {
      --bg:        #080b10;
      --surface:   #0d1117;
      --panel:     #111827;
      --border:    rgba(255,255,255,.07);
      --accent:    #e63946;
      --accent2:   #f4a261;
      --glow:      rgba(230,57,70,.35);
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --radius:    12px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --ease:      cubic-bezier(.22,1,.36,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: .6;
    }

    /* ═══════════════════════════════════════════════════
       GENERATOR VIEW
    ═══════════════════════════════════════════════════ */
    #generator-view {
      max-width: 860px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 56px;
    }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(230,57,70,.12);
      border: 1px solid rgba(230,57,70,.25);
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 99px;
      margin-bottom: 20px;
    }
    .header-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; box-shadow: 0 0 0 0 var(--glow); }
      50%      { opacity: .7; box-shadow: 0 0 0 6px transparent; }
    }
    .header h1 {
      font-family: var(--font-head);
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1.05;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 80%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      max-width: 480px;
      margin-inline: auto;
    }

    /* Form card */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(230,57,70,.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .form-section { margin-bottom: 28px; }
    .form-section-title {
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 7px;
      letter-spacing: .04em;
    }
    .field label span {
      color: var(--accent);
      font-size: 10px;
      margin-left: 5px;
      vertical-align: middle;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap svg {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      opacity: .35;
      pointer-events: none;
    }

    input[type="text"], input[type="url"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 12px 14px 12px 40px;
      transition: border-color .2s var(--ease), box-shadow .2s var(--ease);
      outline: none;
    }
    input[type="text"]:focus, input[type="url"]:focus {
      border-color: rgba(230,57,70,.5);
      box-shadow: 0 0 0 3px rgba(230,57,70,.1);
    }
    input::placeholder { color: var(--muted); opacity: .6; }

    /* Buttons */
    .btn-generate {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), #c1121f);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .06em;
      cursor: pointer;
      transition: transform .2s var(--ease), box-shadow .2s var(--ease), opacity .2s;
      box-shadow: 0 4px 24px rgba(230,57,70,.35);
      margin-top: 8px;
    }
    .btn-generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(230,57,70,.5);
    }
    .btn-generate:active { transform: translateY(0); }

    /* ─── Output section ─── */
    #output-section {
      margin-top: 40px;
      display: none;
    }
    #output-section.visible { display: block; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Preview wrapper */
    .preview-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }
    .preview-wrap iframe, .preview-wrap #inline-player-wrap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* URL output */
    .output-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .output-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .output-block-header strong { color: var(--text); }

    .output-code {
      padding: 14px 16px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #a5f3c0;
      word-break: break-all;
      line-height: 1.7;
      max-height: 100px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .btn-copy {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .btn-copy:hover { background: rgba(255,255,255,.12); }
    .btn-copy.copied { color: #4ade80; border-color: rgba(74,222,128,.35); }

    /* ═══════════════════════════════════════════════════
       PLAYER VIEW (modo embebido o directo)
    ═══════════════════════════════════════════════════ */
    #player-view {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
    }
    #player-view.active { display: flex; flex-direction: column; }

    /* Título superpuesto (top) */
    #player-title-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 30;
      padding: 18px 24px;
      background: linear-gradient(to bottom, rgba(0,0,0,.8) 0%, transparent 100%);
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .04em;
      color: #fff;
      pointer-events: none;
      transition: opacity .4s;
    }

    /* El video */
    #main-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Subtítulos nativos .vtt */
    video::cue {
      background: rgba(0,0,0,.75);
      color: #fff;
      font-family: var(--font-body);
      font-size: 1.1em;
      border-radius: 4px;
      padding: 2px 6px;
    }

    /* ── Barra de controles ── */
    #controls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 30;
      padding: 0 20px 18px;
      background: linear-gradient(to top, rgba(0,0,0,.85) 0%, transparent 100%);
      transform: translateY(0);
      transition: opacity .35s, transform .35s var(--ease);
    }
    #controls.hidden {
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
    }

    /* Progress bar */
    #progress-wrap {
      position: relative;
      height: 4px;
      background: rgba(255,255,255,.2);
      border-radius: 99px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: height .15s;
    }
    #progress-wrap:hover { height: 7px; }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      width: 0%;
      pointer-events: none;
    }
    #progress-thumb {
      position: absolute;
      top: 50%; transform: translate(-50%,-50%) scale(0);
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform .15s;
      pointer-events: none;
    }
    #progress-wrap:hover #progress-thumb { transform: translate(-50%,-50%) scale(1); }

    /* Time tooltip */
    #time-tooltip {
      position: absolute;
      bottom: 18px;
      background: rgba(0,0,0,.85);
      color: #fff;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      pointer-events: none;
      white-space: nowrap;
      display: none;
      transform: translateX(-50%);
    }

    /* Buttons row */
    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .ctrl-row-right { margin-left: auto; display: flex; align-items: center; gap: 4px; }

    .ctrl-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,.85);
      cursor: pointer;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      transition: background .15s, color .15s;
      flex-shrink: 0;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,.12); color: #fff; }
    .ctrl-btn svg { width: 18px; height: 18px; display: block; }

    /* Volume slider */
    #vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 70px; height: 3px;
      background: rgba(255,255,255,.25);
      border-radius: 99px;
      outline: none;
      cursor: pointer;
    }
    #vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
    }

    /* Time display */
    .time-display {
      font-size: 12px;
      color: rgba(255,255,255,.7);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      padding: 0 6px;
    }

    /* Subtitle menu */
    #sub-menu {
      position: absolute;
      bottom: 56px; right: 72px;
      background: rgba(12,15,20,.96);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-width: 160px;
      overflow: hidden;
      display: none;
      box-shadow: 0 12px 40px rgba(0,0,0,.6);
    }
    #sub-menu.open { display: block; }
    .sub-menu-title {
      padding: 10px 14px 6px;
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .sub-item {
      padding: 9px 14px;
      cursor: pointer;
      font-size: 13px;
      transition: background .15s;
      display: flex; align-items: center; gap: 8px;
    }
    .sub-item:hover { background: rgba(255,255,255,.07); }
    .sub-item.active { color: var(--accent); }
    .sub-item .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      opacity: 0;
    }
    .sub-item.active .dot { opacity: 1; }

    /* Overlay VTT (renderer propio) */
    #vtt-overlay {
      position: absolute;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 21;
      text-align: center;
      pointer-events: none;
      width: 90%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    #vtt-overlay span {
      display: inline-block;
      background: rgba(0,0,0,.78);
      color: #fff;
      font-family: var(--font-body);
      font-size: clamp(14px, 2.2vw, 20px);
      font-weight: 400;
      line-height: 1.45;
      padding: 3px 10px 4px;
      border-radius: 4px;
      white-space: pre-wrap;
      max-width: 100%;
    }
    #vtt-overlay strong { font-weight: 700; }
    #vtt-overlay em     { font-style: italic; }

    /* Overlay de SubtitlesOctopus */
    #octopus-wrap {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      overflow: hidden;
    }
    #octopus-wrap canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* Spinner */
    #spinner {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      z-index: 25;
      display: none;
    }
    #spinner.active { display: block; }
    .spin-ring {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error overlay */
    #player-error {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(0,0,0,.7);
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      padding: 24px;
      z-index: 26;
    }
    #player-error.active { display: flex; }
    #player-error strong { color: var(--accent); font-size: 18px; }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      #generator-view { padding: 32px 14px 80px; }
      .card { padding: 22px 16px; }
      #vol-slider { display: none; }
      .time-display { font-size: 11px; }
    }

    /* Animación entrada */
    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp .6s var(--ease) forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .delay-1 { animation-delay: .1s; }
    .delay-2 { animation-delay: .2s; }
    .delay-3 { animation-delay: .3s; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     VISTA: GENERADOR (se muestra si NO hay params en URL)
══════════════════════════════════════════════════ -->
<div id="generator-view">

  <header class="header fade-up">
    <div class="header-badge">Reproductor Embebible</div>
    <h1>StreamForge</h1>
    <p>Genera reproductores de video con HLS, subtítulos .vtt y .ass, listos para incrustar en cualquier sitio.</p>
  </header>

  <div class="card fade-up delay-1">

    <!-- ── Sección: Fuente de Video ── -->
    <div class="form-section">
      <div class="form-section-title">Fuente de video</div>

      <div class="field">
        <label for="inp-video">URL del Stream .m3u8 <span>* requerido</span></label>
        <div class="input-wrap">
          <!-- Ícono stream -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <input type="url" id="inp-video" placeholder="https://ejemplo.com/stream/index.m3u8" autocomplete="off" spellcheck="false" />
        </div>
      </div>

      <div class="field">
        <label for="inp-title">Título del video</label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          <input type="text" id="inp-title" placeholder="Nombre del episodio o película" />
        </div>
      </div>
    </div>

    <!-- ── Sección: Subtítulos ── -->
    <div class="form-section">
      <div class="form-section-title">Subtítulos</div>

      <div class="field">
        <label for="inp-vtt">URL subtítulos .vtt</label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 2l-4 5-4-5"/></svg>
          <input type="url" id="inp-vtt" placeholder="https://ejemplo.com/subs/subtitulo.vtt" />
        </div>
      </div>

      <div class="field">
        <label for="inp-ass">URL subtítulos .ass / .ssa <span>(estilos avanzados)</span></label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 2l-4 5-4-5"/></svg>
          <input type="url" id="inp-ass" placeholder="https://ejemplo.com/subs/subtitulo.ass" />
        </div>
      </div>
    </div>

    <!-- Botón principal -->
    <button class="btn-generate" id="btn-generate">
      ⚡ Generar Reproductor
    </button>

  </div><!-- /card -->

  <!-- ── Output: URL + iframe ── -->
  <div id="output-section">

    <div class="divider">Resultado</div>

    <!-- Preview 16:9 -->
    <div class="preview-wrap" id="preview-wrap">
      <!-- El reproductor inline se inyecta aquí en modo preview -->
    </div>

    <!-- URL generada -->
    <div class="output-block fade-up">
      <div class="output-block-header">
        <strong>🔗 URL del reproductor</strong>
        <button class="btn-copy" id="copy-url" onclick="copyText('copy-url','url-code')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copiar
        </button>
      </div>
      <div class="output-code" id="url-code"></div>
    </div>

    <!-- Iframe generado -->
    <div class="output-block fade-up delay-1">
      <div class="output-block-header">
        <strong>📋 Código iframe</strong>
        <button class="btn-copy" id="copy-iframe" onclick="copyText('copy-iframe','iframe-code')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copiar
        </button>
      </div>
      <div class="output-code" id="iframe-code"></div>
    </div>

  </div><!-- /output-section -->

</div><!-- /generator-view -->


<!-- ══════════════════════════════════════════════════
     VISTA: REPRODUCTOR (se activa cuando hay params en URL)
══════════════════════════════════════════════════ -->
<div id="player-view">

  <!-- Título -->
  <div id="player-title-bar" id="ptitle"></div>

  <!-- Video element -->
  <video id="main-video" playsinline preload="metadata"></video>

  <!-- Overlay para subtítulos VTT (renderer propio, evita problemas cross-origin) -->
  <div id="vtt-overlay"></div>

  <!-- Contenedor para SubtitlesOctopus (.ass) -->
  <div id="octopus-wrap"></div>

  <!-- Spinner de carga -->
  <div id="spinner"><div class="spin-ring"></div></div>

  <!-- Mensaje de error -->
  <div id="player-error">
    <strong>Error de reproducción</strong>
    <span id="error-msg">No se pudo cargar el stream.</span>
  </div>

  <!-- Tooltip de tiempo al scrubbing -->
  <div id="time-tooltip"></div>

  <!-- ── Controles ── -->
  <div id="controls">

    <!-- Barra de progreso -->
    <div id="progress-wrap" id="progress-wrap">

      <!-- Volumen -->
      <button class="ctrl-btn" id="btn-mute" title="Mute">
        <svg id="icon-vol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <svg id="icon-mute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
      </button>
      <input type="range" id="vol-slider" min="0" max="1" step="0.02" value="1" />

      <!-- Tiempo -->
      <span class="time-display" id="time-current">0:00</span>
      <span class="time-display" style="opacity:.4">/</span>
      <span class="time-display" id="time-total">0:00</span>

      <div class="ctrl-row-right">

        <!-- Subtítulos -->
        <button class="ctrl-btn" id="btn-subs" title="Subtítulos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M7 13h4"/><path d="M15 13h2"/><path d="M7 17h2"/><path d="M13 17h4"/></svg>
        </button>

        <!-- Fullscreen -->
        <button class="ctrl-btn" id="btn-fs" title="Pantalla completa">
          <svg id="icon-fs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          <svg id="icon-exit-fs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
        </button>

      </div>
    </div>
  </div><!-- /controls -->

  <!-- Menú de subtítulos -->
  <div id="sub-menu">
    <div class="sub-menu-title">Subtítulos</div>
    <!-- Items se generan dinámicamente -->
  </div>

</div><!-- /player-view -->


<script>
/* ══════════════════════════════════════════════════════════════
   StreamForge — Lógica principal
   Estructura:
   1. Lectura de parámetros URL
   2. Modo Generador
   3. Modo Reproductor
   4. HLS.js
   5. SubtitlesOctopus (.ass)  — carga lazy
   6. Controles del player
   7. Utilidades
══════════════════════════════════════════════════════════════ */

/* ──────────────────────────────────────────────────────────
   1. LECTURA DE PARÁMETROS
   La misma página detecta si debe mostrar el generador
   o cargar directamente el reproductor.
────────────────────────────────────────────────────────── */
const params   = new URLSearchParams(window.location.search);
const P_VIDEO  = params.get('video');  // URL m3u8
const P_VTT    = params.get('vtt');    // URL subtítulo .vtt
const P_ASS    = params.get('ass');    // URL subtítulo .ass
const P_TITLE  = params.get('title'); // Título opcional

// Si hay parámetro "video" → modo reproductor; si no → generador
if (P_VIDEO) {
  document.getElementById('generator-view').style.display = 'none';
  initPlayer(P_VIDEO, P_VTT, P_ASS, P_TITLE || '');
} else {
  document.getElementById('generator-view').style.display = 'block';
  initGenerator();
}


/* ──────────────────────────────────────────────────────────
   2. MODO GENERADOR
────────────────────────────────────────────────────────── */
function initGenerator() {
  const btnGen = document.getElementById('btn-generate');
  btnGen.addEventListener('click', handleGenerate);

  // También genera al presionar Enter en el campo video
  document.getElementById('inp-video').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleGenerate();
  });
}

function handleGenerate() {
  const videoUrl = document.getElementById('inp-video').value.trim();
  if (!videoUrl) {
    showInputError('inp-video', 'Ingresa la URL del stream .m3u8');
    return;
  }

  const vttUrl   = document.getElementById('inp-vtt').value.trim();
  const assUrl   = document.getElementById('inp-ass').value.trim();
  const title    = document.getElementById('inp-title').value.trim();

  // Construir URL con parámetros GET
  const base = window.location.origin + window.location.pathname;
  const qp   = new URLSearchParams();
  qp.set('video', videoUrl);
  if (vttUrl)  qp.set('vtt',   vttUrl);
  if (assUrl)  qp.set('ass',   assUrl);
  if (title)   qp.set('title', title);

  const playerUrl = `${base}?${qp.toString()}`;

  // Generar código iframe
  const iframeCode = `<iframe src="${playerUrl}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; fullscreen" style="aspect-ratio:16/9;border:none;border-radius:8px;"></iframe>`;

  // Mostrar resultados
  document.getElementById('url-code').textContent    = playerUrl;
  document.getElementById('iframe-code').textContent = iframeCode;

  const outputSection = document.getElementById('output-section');
  outputSection.classList.add('visible');

  // Preview: cargar el reproductor en modo inline
  renderInlinePreview(videoUrl, vttUrl, assUrl, title);

  // Scroll suave hasta el output
  setTimeout(() => outputSection.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

// Muestra error visual en el campo
function showInputError(id, msg) {
  const el = document.getElementById(id);
  el.style.borderColor = 'var(--accent)';
  el.style.boxShadow   = '0 0 0 3px var(--glow)';
  el.placeholder = msg;
  setTimeout(() => {
    el.style.borderColor = '';
    el.style.boxShadow   = '';
    el.placeholder = 'https://ejemplo.com/stream/index.m3u8';
  }, 2500);
}

/* ──────────────────────────────────────────────────────────
   Preview inline (dentro del card de resultados)
   Crea un iframe embebido con la URL generada
────────────────────────────────────────────────────────── */
function renderInlinePreview(videoUrl, vttUrl, assUrl, title) {
  const wrap = document.getElementById('preview-wrap');
  wrap.innerHTML = '';

  // Usamos un iframe para el preview real
  const base = window.location.origin + window.location.pathname;
  const qp   = new URLSearchParams({ video: videoUrl });
  if (vttUrl)  qp.set('vtt',   vttUrl);
  if (assUrl)  qp.set('ass',   assUrl);
  if (title)   qp.set('title', title);

  const previewUrl = `${base}?${qp.toString()}`;

  const iframe = document.createElement('iframe');
  iframe.src = previewUrl;
  iframe.setAttribute('frameborder', '0');
  iframe.setAttribute('allowfullscreen', '');
  iframe.setAttribute('allow', 'autoplay; fullscreen');
  iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
  wrap.appendChild(iframe);
}


/* ──────────────────────────────────────────────────────────
   3. MODO REPRODUCTOR
   Inicializa video, HLS, controles y subtítulos
────────────────────────────────────────────────────────── */
function initPlayer(videoUrl, vttUrl, assUrl, title) {
  const view = document.getElementById('player-view');
  view.classList.add('active');

  // Título
  const titleBar = document.getElementById('player-title-bar');
  titleBar.textContent = title || '';

  const video = document.getElementById('main-video');

  // Mostrar spinner mientras carga
  showSpinner(true);

  // Inicializar HLS
  loadHLS(video, videoUrl);

  // Eventos del video
  video.addEventListener('playing',  () => showSpinner(false));
  video.addEventListener('waiting',  () => showSpinner(true));
  video.addEventListener('canplay',  () => showSpinner(false));
  video.addEventListener('error',    () => showError('Error al cargar el stream. Verifica la URL y los permisos CORS.'));

  // Inicializar controles
  initControls(video);

  // Configurar subtítulos
  setupSubtitles(video, vttUrl, assUrl);

  // Ocultar controles automáticamente tras 3s de inactividad
  setupControlsAutoHide();

  // Ocultar barra de título con los controles
  setupTitleAutoHide(titleBar);
}


/* ──────────────────────────────────────────────────────────
   4. HLS.JS — carga adaptativa del stream .m3u8
   Detecta soporte nativo (Safari) y usa HLS.js como fallback
────────────────────────────────────────────────────────── */

// Guardamos referencia global para poder agregar el track VTT
// DESPUÉS de que HLS haya adjuntado el media (evita que el navegador lo ignore)
let _hlsReadyCallbacks = [];
function onHlsReady(cb) { _hlsReadyCallbacks.push(cb); }

function loadHLS(video, url) {
  if (Hls.isSupported()) {
    const hls = new Hls({ enableWorker: true, lowLatencyMode: false });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
      // Disparar callbacks registrados (ej: agregar track VTT)
      _hlsReadyCallbacks.forEach(cb => cb());
      _hlsReadyCallbacks = [];
    });
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) showError(`Error HLS: ${data.type}`);
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.addEventListener('loadedmetadata', () => {
      video.play().catch(() => {});
      _hlsReadyCallbacks.forEach(cb => cb());
      _hlsReadyCallbacks = [];
    });
  } else {
    showError('Tu navegador no soporta reproducción HLS.');
  }
}


/* ══════════════════════════════════════════════════════════════
   5. SUBTÍTULOS
   - .vtt → fetch manual + renderer propio en div overlay
             (evita el problema de cross-origin con <track> nativo
              y el formato MM:SS.mmm sin horas que algunos browsers rechazan)
   - .ass → SubtitlesOctopus cargado lazy
══════════════════════════════════════════════════════════════ */

const SubState = {
  current:    null,   // 'vtt' | 'ass' | null
  octopus:    null,   // instancia SubtitlesOctopus
  vttCues:    [],     // array de { start, end, html }
  rafId:      null,   // requestAnimationFrame loop del VTT renderer
};

/* ── Punto de entrada ── */
function setupSubtitles(video, vttUrl, assUrl) {
  const subMenu = document.getElementById('sub-menu');
  const items   = [{ id: 'off', label: 'Sin subtítulos' }];

  if (vttUrl) items.push({ id: 'vtt', label: 'Subtítulos (VTT)' });
  if (assUrl) items.push({ id: 'ass', label: 'Subtítulos (ASS)' });

  buildSubMenu(subMenu, items, video, vttUrl, assUrl);

  if (!vttUrl && !assUrl) {
    document.getElementById('btn-subs').style.display = 'none';
    return;
  }

  // Pre-cargar el VTT en background para que esté listo al instante
  if (vttUrl) fetchAndParseVTT(vttUrl);

  // Activar el primero disponible cuando el video esté listo
  onHlsReady(() => {
    const defaultId = vttUrl ? 'vtt' : 'ass';
    selectSubtitle(defaultId, video, vttUrl, assUrl, subMenu, items);
  });
}

/* ── Menú ── */
function buildSubMenu(menu, items, video, vttUrl, assUrl) {
  menu.innerHTML = '<div class="sub-menu-title">Subtítulos</div>';
  items.forEach(item => {
    const div = document.createElement('div');
    div.className  = 'sub-item' + (item.id === 'off' ? ' active' : '');
    div.dataset.id = item.id;
    div.innerHTML  = `<span class="dot"></span>${item.label}`;
    div.addEventListener('click', () =>
      selectSubtitle(item.id, video, vttUrl, assUrl, menu, items));
    menu.appendChild(div);
  });
}

function selectSubtitle(id, video, vttUrl, assUrl, menu, items) {
  menu.querySelectorAll('.sub-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id));

  disableAllSubs();
  SubState.current = id;

  if (id === 'vtt' && vttUrl) enableVttRenderer(video);
  else if (id === 'ass' && assUrl) enableAssSub(video, assUrl);

  menu.classList.remove('open');
}

function disableAllSubs() {
  // Parar loop VTT
  if (SubState.rafId) { cancelAnimationFrame(SubState.rafId); SubState.rafId = null; }
  const overlay = document.getElementById('vtt-overlay');
  if (overlay) overlay.innerHTML = '';

  // Apagar octopus
  if (SubState.octopus) {
    try { SubState.octopus.freeTrack(); } catch(e){}
    SubState.octopus = null;
  }
  document.getElementById('octopus-wrap').innerHTML = '';
}

/* ══════════════════════════════════════════════════════════════
   VTT: fetch → parse → render propio
   No usa <track> del browser (falla cross-origin y con MM:SS sin horas)
══════════════════════════════════════════════════════════════ */

/* Convierte "HH:MM:SS.mmm" o "MM:SS.mmm" a segundos */
function vttTimeToSec(t) {
  const parts = t.trim().split(':');
  let h = 0, m = 0, s = 0;
  if (parts.length === 3) {
    [h, m, s] = parts.map(parseFloat);
  } else if (parts.length === 2) {
    [m, s] = parts.map(parseFloat);
  } else {
    s = parseFloat(parts[0]);
  }
  return h * 3600 + m * 60 + s;
}

/* Parsea texto VTT y devuelve array de cues */
function parseVTT(text) {
  const cues = [];
  // Normalizar saltos de línea
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  let i = 0;
  while (i < lines.length) {
    // Buscar línea de tiempo: "HH:MM:SS.mmm --> HH:MM:SS.mmm" o "MM:SS.mmm --> MM:SS.mmm"
    if (lines[i] && lines[i].includes('-->')) {
      const timeParts = lines[i].split('-->');
      const start = vttTimeToSec(timeParts[0]);
      // Ignorar configuraciones de posición después del tiempo de fin
      const endRaw = timeParts[1].trim().split(' ')[0];
      const end    = vttTimeToSec(endRaw);

      // Recoger líneas de texto hasta línea vacía
      const textLines = [];
      i++;
      while (i < lines.length && lines[i].trim() !== '') {
        textLines.push(lines[i]);
        i++;
      }

      // Convertir etiquetas VTT básicas a HTML seguro
      let html = textLines.join('<br>')
        .replace(/<b>/gi, '<strong>').replace(/<\/b>/gi, '</strong>')
        .replace(/<i>/gi, '<em>').replace(/<\/i>/gi, '</em>')
        .replace(/<u>/gi, '<u>').replace(/<\/u>/gi, '</u>')
        // Quitar tags de posición/color que no vamos a renderizar
        .replace(/<[^>]+>/g, (m) => {
          const allowed = ['strong','em','u','/strong','/em','/u','br'];
          const tag = m.replace(/<\/?/, '').replace(/>/, '').toLowerCase().trim();
          return allowed.includes(tag) ? m : '';
        });

      if (html.trim() && start < end) cues.push({ start, end, html });
    }
    i++;
  }
  return cues;
}

/* Fetch + parse del archivo VTT (guarda en SubState.vttCues) */
async function fetchAndParseVTT(url) {
  try {
    const res  = await fetch(url, { mode: 'cors' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    SubState.vttCues = parseVTT(text);
    console.log(`[VTT] ${SubState.vttCues.length} cues cargados`);
  } catch (err) {
    console.warn('[VTT] Error al cargar subtítulos:', err);
    SubState.vttCues = [];
  }
}

/* Loop de renderizado: muestra el cue correcto según video.currentTime */
function enableVttRenderer(video) {
  // Si todavía no tenemos cues, intentar cargar de nuevo
  if (!SubState.vttCues.length) {
    // Esperar a que fetchAndParseVTT termine (puede que aún esté en vuelo)
    // lo reintentamos cada 200ms hasta 5s
    let attempts = 0;
    const wait = setInterval(() => {
      attempts++;
      if (SubState.vttCues.length || attempts > 25) {
        clearInterval(wait);
        if (SubState.vttCues.length) startVttLoop(video);
        else console.warn('[VTT] Sin cues tras espera');
      }
    }, 200);
    return;
  }
  startVttLoop(video);
}

function startVttLoop(video) {
  const overlay = document.getElementById('vtt-overlay');
  if (!overlay) return;
  let lastHtml = null;

  function tick() {
    if (SubState.current !== 'vtt') return; // fue desactivado
    const t = video.currentTime;

    // Buscar cue activo (puede haber varios simultáneos, como en este archivo)
    const active = SubState.vttCues.filter(c => t >= c.start && t < c.end);
    const html   = active.map(c => `<span>${c.html}</span>`).join('');

    // Solo actualizar DOM si cambió (evita reflows innecesarios)
    if (html !== lastHtml) {
      overlay.innerHTML = html;
      lastHtml = html;
    }

    SubState.rafId = requestAnimationFrame(tick);
  }
  SubState.rafId = requestAnimationFrame(tick);
}

/* ══════════════════════════════════════════════════════════════
   ASS: SubtitlesOctopus lazy-load
══════════════════════════════════════════════════════════════ */
function enableAssSub(video, assUrl) {
  if (typeof SubtitlesOctopus === 'undefined') {
    loadScript(
      'https://cdn.jsdelivr.net/npm/javascript-subtitles-octopus@5.1.1/dist/subtitles-octopus.js',
      () => createOctopusInstance(video, assUrl)
    );
  } else {
    createOctopusInstance(video, assUrl);
  }
}

function createOctopusInstance(video, assUrl) {
  const wrap = document.getElementById('octopus-wrap');
  wrap.innerHTML = '';

  try {
    // SubtitlesOctopus crea su propio canvas y lo inserta junto al video.
    // Le pasamos el contenedor explícitamente via `canvas` para controlarlo.
    const canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;';
    wrap.appendChild(canvas);

    SubState.octopus = new SubtitlesOctopus({
      video:           video,
      subUrl:          assUrl,
      canvas:          canvas,
      fonts:           [],
      workerUrl:       'https://cdn.jsdelivr.net/npm/javascript-subtitles-octopus@5.1.1/dist/subtitles-octopus-worker.js',
      legacyWorkerUrl: 'https://cdn.jsdelivr.net/npm/javascript-subtitles-octopus@5.1.1/dist/subtitles-octopus-worker-legacy.js',
      renderMode:      'wasm',
      onReady: () => console.log('[ASS] SubtitlesOctopus listo'),
    });
  } catch (err) {
    console.warn('[ASS] Error iniciando SubtitlesOctopus:', err);
  }
}


/* ──────────────────────────────────────────────────────────
   6. CONTROLES DEL REPRODUCTOR
────────────────────────────────────────────────────────── */
function initControls(video) {
  const btnPlay  = document.getElementById('btn-play');
  const btnMute  = document.getElementById('btn-mute');
  const btnFs    = document.getElementById('btn-fs');
  const btnSubs  = document.getElementById('btn-subs');
  const volSlider = document.getElementById('vol-slider');
  const progressWrap = document.getElementById('progress-wrap');
  const progressFill = document.getElementById('progress-fill');
  const progressThumb = document.getElementById('progress-thumb');
  const timeCurrent = document.getElementById('time-current');
  const timeTotal   = document.getElementById('time-total');
  const timeTooltip = document.getElementById('time-tooltip');
  const subMenu     = document.getElementById('sub-menu');

  /* ── Play / Pause ── */
  btnPlay.addEventListener('click', () => togglePlay(video));
  video.addEventListener('click',   () => togglePlay(video));

  video.addEventListener('play',  () => setPlayIcon(true));
  video.addEventListener('pause', () => setPlayIcon(false));

  function togglePlay(v) {
    v.paused ? v.play() : v.pause();
  }
  function setPlayIcon(playing) {
    document.getElementById('icon-play').style.display  = playing ? 'none' : '';
    document.getElementById('icon-pause').style.display = playing ? '' : 'none';
  }

  /* ── Volumen ── */
  volSlider.addEventListener('input', () => {
    video.volume = parseFloat(volSlider.value);
    video.muted  = video.volume === 0;
    updateMuteIcon();
  });
  btnMute.addEventListener('click', () => {
    video.muted = !video.muted;
    if (!video.muted && video.volume === 0) video.volume = 0.5;
    volSlider.value = video.muted ? 0 : video.volume;
    updateMuteIcon();
  });
  function updateMuteIcon() {
    const muted = video.muted || video.volume === 0;
    document.getElementById('icon-vol').style.display  = muted ? 'none' : '';
    document.getElementById('icon-mute').style.display = muted ? '' : 'none';
  }

  /* ── Progreso ── */
  video.addEventListener('timeupdate', () => {
    if (!video.duration) return;
    const pct = (video.currentTime / video.duration) * 100;
    progressFill.style.width = pct + '%';
    progressThumb.style.left = pct + '%';
    timeCurrent.textContent  = formatTime(video.currentTime);
  });
  video.addEventListener('loadedmetadata', () => {
    timeTotal.textContent = formatTime(video.duration);
  });

  // Click en la barra de progreso → seek
  let isDragging = false;
  function seekFromEvent(e) {
    const rect = progressWrap.getBoundingClientRect();
    const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    if (video.duration) video.currentTime = pct * video.duration;
    progressFill.style.width = (pct * 100) + '%';
    progressThumb.style.left = (pct * 100) + '%';
  }

  progressWrap.addEventListener('mousedown', e => { isDragging = true; seekFromEvent(e); });
  document.addEventListener('mousemove',     e => { if (isDragging) seekFromEvent(e); });
  document.addEventListener('mouseup',       ()  => { isDragging = false; });

  // Tooltip de tiempo al hover
  progressWrap.addEventListener('mousemove', e => {
    if (!video.duration) return;
    const rect = progressWrap.getBoundingClientRect();
    const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    timeTooltip.style.display = 'block';
    timeTooltip.style.left    = (pct * 100) + '%';
    timeTooltip.textContent   = formatTime(pct * video.duration);
  });
  progressWrap.addEventListener('mouseleave', () => { timeTooltip.style.display = 'none'; });

  // Touch support para móvil
  progressWrap.addEventListener('touchstart', e => { isDragging = true; seekFromTouch(e); }, { passive: true });
  document.addEventListener('touchmove',      e => { if (isDragging) seekFromTouch(e); },    { passive: true });
  document.addEventListener('touchend',       ()  => { isDragging = false; });
  function seekFromTouch(e) {
    const touch = e.touches[0];
    const rect  = progressWrap.getBoundingClientRect();
    const pct   = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width));
    if (video.duration) video.currentTime = pct * video.duration;
    progressFill.style.width = (pct * 100) + '%';
    progressThumb.style.left = (pct * 100) + '%';
  }

  /* ── Fullscreen ── */
  const playerView = document.getElementById('player-view');
  btnFs.addEventListener('click', toggleFullscreen);

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      (playerView.requestFullscreen || playerView.webkitRequestFullscreen).call(playerView);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
  }
  document.addEventListener('fullscreenchange', updateFsIcon);
  document.addEventListener('webkitfullscreenchange', updateFsIcon);
  function updateFsIcon() {
    const isFs = !!document.fullscreenElement;
    document.getElementById('icon-fs').style.display     = isFs ? 'none' : '';
    document.getElementById('icon-exit-fs').style.display = isFs ? '' : 'none';
  }

  // Doble clic para fullscreen en desktop
  video.addEventListener('dblclick', toggleFullscreen);

  /* ── Menú de subtítulos ── */
  btnSubs.addEventListener('click', e => {
    e.stopPropagation();
    subMenu.classList.toggle('open');
  });
  document.addEventListener('click', () => subMenu.classList.remove('open'));

  /* ── Teclado ── */
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space')       { e.preventDefault(); togglePlay(video); }
    if (e.code === 'ArrowRight')  { video.currentTime = Math.min(video.duration, video.currentTime + 10); }
    if (e.code === 'ArrowLeft')   { video.currentTime = Math.max(0, video.currentTime - 10); }
    if (e.code === 'ArrowUp')     { video.volume = Math.min(1, video.volume + .1); volSlider.value = video.volume; updateMuteIcon(); }
    if (e.code === 'ArrowDown')   { video.volume = Math.max(0, video.volume - .1); volSlider.value = video.volume; updateMuteIcon(); }
    if (e.code === 'KeyF')        { toggleFullscreen(); }
    if (e.code === 'KeyM')        { btnMute.click(); }
  });
}

/* Auto-ocultar controles */
function setupControlsAutoHide() {
  const controls = document.getElementById('controls');
  const player   = document.getElementById('player-view');
  let   timer;

  function show() {
    controls.classList.remove('hidden');
    player.style.cursor = '';
    clearTimeout(timer);
    timer = setTimeout(hide, 3000);
  }
  function hide() {
    controls.classList.add('hidden');
    player.style.cursor = 'none';
  }

  player.addEventListener('mousemove',  show);
  player.addEventListener('touchstart', show, { passive: true });
  player.addEventListener('mouseleave', hide);

  show(); // iniciar con controles visibles
}

function setupTitleAutoHide(titleBar) {
  const controls = document.getElementById('controls');
  const observer = new MutationObserver(() => {
    titleBar.style.opacity = controls.classList.contains('hidden') ? '0' : '1';
  });
  observer.observe(controls, { attributes: true, attributeFilter: ['class'] });
}


/* ──────────────────────────────────────────────────────────
   7. UTILIDADES
────────────────────────────────────────────────────────── */

// Formatea segundos → m:ss
function formatTime(sec) {
  if (!isFinite(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// Muestra/oculta spinner de carga
function showSpinner(show) {
  document.getElementById('spinner').classList.toggle('active', show);
}

// Muestra overlay de error
function showError(msg) {
  showSpinner(false);
  const err = document.getElementById('player-error');
  document.getElementById('error-msg').textContent = msg;
  err.classList.add('active');
}

// Carga un script JS dinámicamente (para SubtitlesOctopus)
function loadScript(src, callback) {
  const s    = document.createElement('script');
  s.src      = src;
  s.onload   = callback;
  s.onerror  = () => console.warn('[loadScript] Fallo al cargar:', src);
  document.head.appendChild(s);
}

// Copia texto al portapapeles
function copyText(btnId, codeId) {
  const text = document.getElementById(codeId).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copiado`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copiar`;
    }, 2500);
  }).catch(() => {
    // Fallback para navegadores sin Clipboard API
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity  = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}
