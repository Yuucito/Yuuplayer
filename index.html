<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamForge — Generador de Reproductores</title>

  <!-- HLS.js para streams .m3u8 -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <style>
    /* Estilos originales de StreamForge */
    :root {
      --bg: #080b10; --surface: #0d1117; --panel: #111827; --border: rgba(255,255,255,.07);
      --accent: #e63946; --accent2: #f4a261; --glow: rgba(230,57,70,.35);
      --text: #e8eaf0; --muted: #6b7280; --radius: 12px;
      --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
      --ease: cubic-bezier(.22,1,.36,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }

    /* Generador */
    #generator-view { max-width: 860px; margin: 0 auto; padding: 60px 24px; }
    .header { text-align: center; margin-bottom: 56px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 18px; padding: 36px; }
    .field { margin-bottom: 16px; }
    input[type="text"], input[type="url"] {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); padding: 12px 14px; outline: none;
    }
    .btn-generate {
      width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent), #c1121f);
      border: none; border-radius: var(--radius); color: #fff; font-weight: 700; cursor: pointer;
    }
    #output-section { margin-top: 40px; display: none; }
    .preview-wrap { position: relative; padding-top: 56.25%; background: #000; border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; }

    /* Reproductor */
    #player-view { display: none; position: fixed; inset: 0; background: #000; z-index: 100; }
    #player-view.active { display: flex; flex-direction: column; }
    #main-video { width: 100%; height: 100%; object-fit: contain; }
    #controls { position: absolute; bottom: 0; left: 0; right: 0; z-index: 30; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); transition: opacity 0.3s; }
    #controls.hidden { opacity: 0; pointer-events: none; }
    #progress-wrap { height: 4px; background: rgba(255,255,255,0.2); cursor: pointer; margin-bottom: 15px; position: relative; }
    #progress-fill { height: 100%; background: var(--accent); width: 0; }
    .ctrl-row { display: flex; align-items: center; gap: 15px; }
    .ctrl-btn { background: none; border: none; color: #fff; cursor: pointer; }
    #sub-menu { position: absolute; bottom: 70px; right: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; display: none; padding: 10px; }
    #sub-menu.open { display: block; }
    .sub-item { padding: 8px 12px; cursor: pointer; font-size: 14px; }
    .sub-item.active { color: var(--accent); }
    #octopus-wrap { position: absolute; inset: 0; pointer-events: none; z-index: 20; }
  </style>
</head>
<body>

<div id="generator-view">
  <header class="header"><h1>StreamForge</h1><p>Generador de reproductores</p></header>
  <div class="card">
    <div class="field"><label>URL .m3u8</label><input type="url" id="inp-video" placeholder="https://..."></div>
    <div class="field"><label>Subtítulos .vtt</label><input type="url" id="inp-vtt" placeholder="https://..."></div>
    <div class="field"><label>Subtítulos .ass</label><input type="url" id="inp-ass" placeholder="https://..."></div>
    <button class="btn-generate" id="btn-generate">⚡ Generar Reproductor</button>
  </div>
  <div id="output-section">
    <div class="preview-wrap" id="preview-wrap"></div>
    <div class="output-code" id="url-code" style="background:#111; padding:10px; color:#4ade80; border-radius:8px; word-break:break-all;"></div>
  </div>
</div>

<div id="player-view">
  <video id="main-video" playsinline crossorigin="anonymous"></video>
  <div id="octopus-wrap"></div>
  <div id="controls">
    <div id="progress-wrap"><div id="progress-fill"></div></div>
    <div class="ctrl-row">
      <button class="ctrl-btn" id="btn-play">Play/Pause</button>
      <span id="time-display" style="font-size:13px;">0:00 / 0:00</span>
      <div style="margin-left:auto;">
        <button class="ctrl-btn" id="btn-subs">Subtítulos</button>
        <button class="ctrl-btn" id="btn-fs">Fullscreen</button>
      </div>
    </div>
  </div>
  <div id="sub-menu"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const P_VIDEO = params.get('video'), P_VTT = params.get('vtt'), P_ASS = params.get('ass');

if (P_VIDEO) {
  document.getElementById('generator-view').style.display = 'none';
  initPlayer(P_VIDEO, P_VTT, P_ASS);
} else {
  initGenerator();
}

function initGenerator() {
  document.getElementById('btn-generate').onclick = () => {
    const v = document.getElementById('inp-video').value;
    if(!v) return;
    const q = new URLSearchParams({ video: v });
    if(document.getElementById('inp-vtt').value) q.set('vtt', document.getElementById('inp-vtt').value);
    if(document.getElementById('inp-ass').value) q.set('ass', document.getElementById('inp-ass').value);
    
    const url = window.location.origin + window.location.pathname + '?' + q.toString();
    document.getElementById('url-code').textContent = url;
    document.getElementById('output-section').style.display = 'block';
    document.getElementById('preview-wrap').innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen style="position:absolute;inset:0;width:100%;height:100%;"></iframe>`;
  };
}

function initPlayer(videoUrl, vttUrl, assUrl) {
  const video = document.getElementById('main-video');
  const view = document.getElementById('player-view');
  view.classList.add('active');

  // HLS.js
  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(videoUrl);
    hls.attachMedia(video);
  } else {
    video.src = videoUrl;
  }

  // Subtítulos VTT nativos[cite: 1]
  if (vttUrl) {
    const track = document.createElement('track');
    track.kind = 'subtitles'; track.src = vttUrl; track.srclang = 'es'; track.label = 'VTT';
    video.appendChild(track);
  }

  // Lógica de SubtitlesOctopus para .ass[cite: 1]
  let octopus = null;
  function loadAss(url) {
    if (typeof SubtitlesOctopus === 'undefined') {
      const s = document.createElement('script');
      s.src = "https://cdn.jsdelivr.net/npm/javascript-subtitles-octopus@5.1.1/dist/subtitles-octopus.js";
      s.onload = () => createOctopus(url);
      document.head.appendChild(s);
    } else { createOctopus(url); }
  }

  function createOctopus(url) {
    octopus = new SubtitlesOctopus({
      video: video, subUrl: url,
      workerUrl: "https://cdn.jsdelivr.net/npm/javascript-subtitles-octopus@5.1.1/dist/subtitles-octopus-worker.js"
    });
  }

  // Menú de Subtítulos
  const menu = document.getElementById('sub-menu');
  const items = [{id:'off', n:'Desactivado'}];
  if(vttUrl) items.push({id:'vtt', n:'Español (VTT)'});
  if(assUrl) items.push({id:'ass', n:'Efectos (ASS)'});

  items.forEach(it => {
    const d = document.createElement('div');
    d.className = 'sub-item'; d.textContent = it.n;
    d.onclick = () => {
      // Limpiar anteriores
      for(let t of video.textTracks) t.mode = 'disabled';
      if(octopus) { octopus.freeTrack(); octopus = null; document.getElementById('octopus-wrap').innerHTML = ''; }
      
      if(it.id === 'vtt') video.textTracks[0].mode = 'showing';
      if(it.id === 'ass') loadAss(assUrl);
      menu.classList.remove('open');
    };
    menu.appendChild(d);
  });

  // Controles
  document.getElementById('btn-play').onclick = () => video.paused ? video.play() : video.pause();
  document.getElementById('btn-subs').onclick = (e) => { e.stopPropagation(); menu.classList.toggle('open'); };
  document.getElementById('btn-fs').onclick = () => view.requestFullscreen();
  
  // Barra de progreso y adelantar/atrás[cite: 1]
  video.ontimeupdate = () => {
    const pct = (video.currentTime / video.duration) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('time-display').textContent = formatTime(video.currentTime) + " / " + formatTime(video.duration);
  };

  document.getElementById('progress-wrap').onclick = (e) => {
    const rect = e.target.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    video.currentTime = pos * video.duration;
  };

  // Teclado (Adelantar/Atrás)
  document.onkeydown = (e) => {
    if(e.key === "ArrowRight") video.currentTime += 10;
    if(e.key === "ArrowLeft") video.currentTime -= 10;
    if(e.key === " ") video.paused ? video.play() : video.pause();
  };

  function formatTime(s) {
    if(!s) return "0:00";
    const m = Math.floor(s/60);
    const sec = Math.floor(s%60);
    return m + ":" + (sec < 10 ? "0" + sec : sec);
  }
}
</script>
</body>
</html>
